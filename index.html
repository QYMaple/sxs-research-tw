    body {

        flex-direction: column;
        align-items: center;

        margin: 0;
        background-color: #f5f5f7;
        /* 移除点击时的蓝色高亮（移动端优化） */

    .container {
        width: 90%;
        max-width: 400px;
        text-align: center;
        padding: 40px 0;
    }

    h1 {
        font-size: 1.5rem;
        margin-bottom: 2rem;
        color: #1d1d1f;
        font-weight: 700;
        letter-spacing: -0.5px;
    }

    .btn-card {
        position: relative;
        display: flex;
        align-items: center;
        width: 100%;
        background-color: white;
        margin-bottom: 15px;
        padding: 10px;
        text-decoration: none;
        border-radius: 16px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        box-sizing: border-box;
        overflow: hidden;
        transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s ease;
    }

    .btn-card:active {
        transform: scale(0.98);
        box-shadow: 0 2px 5px rgba(0,0,0,0.03);
    }

    .btn-img {
        width: 50px;
        height: 50px;
        border-radius: 10px;
        object-fit: cover;
        margin-right: 15px;
        flex-shrink: 0;
        background-color: white;
    }

    .btn-text {
        font-size: 1.05rem;
        font-weight: 600;
        color: #1d1d1f;
        text-align: left;
    }

    .btn-card-multiple {
        cursor: default !important;
    }
    .btn-links-group {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: flex-end;
        align-content: center;
        gap: 8px;
        margin-left: auto;
        max-width: 180px;
    }

    .sub-link {
        width: 80px;
        padding: 8px 0;
        background: #f5f5f7;
        color: #0071e3;
        text-decoration: none;
        border-radius: 10px;
        font-size: 0.85rem;
        font-weight: 600;
        text-align: center;
        transition: all 0.2s ease;
    }
    .sub-link:active {
        transform: scale(0.95);
        background: #e8e8ed;
    }
    
    .footer {
        margin-top: 2.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        font-size: 0.85rem;
        color: #86868b;
    }
    .footer a {
        color: #bb271a;
        text-decoration: none;
        font-weight: 600;
    }
