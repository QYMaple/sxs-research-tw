<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杖劍傳說 - 楓琴柚</title>
    
    <link rel="icon" type="image/webp" href="https://github.com/QYMaple/sxs-research-tw/blob/dc4ea64086d642c4e92831a72381a13ec6c0b558/img/icon.png">
    
    <script data-goatcounter="https://qymaple.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
    
    <style>
    body {
        font-family: "PingFang TC", -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background-color: #f5f5f7;
        -webkit-tap-highlight-color: transparent;
    }

    .container {
        width: 90%;
        max-width: 400px;
        text-align: center;
        padding: 40px 0;
    }

    h1 {
        font-size: 1.5rem;
        margin-bottom: 2rem;
        color: #1d1d1f;
        font-weight: 700;
        letter-spacing: -0.5px;
    }

    .btn-card {
        position: relative;
        display: flex;
        align-items: center;
        width: 100%;
        background-color: white;
        margin-bottom: 15px;
        padding: 10px;
        text-decoration: none;
        border-radius: 16px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        box-sizing: border-box;
        overflow: hidden;
        transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s ease;
    }

    .btn-card:active {
        transform: scale(0.98);
        box-shadow: 0 2px 5px rgba(0,0,0,0.03);
    }

    .btn-img {
        width: 50px;
        height: 50px;
        border-radius: 10px;
        object-fit: cover;
        margin-right: 15px;
        flex-shrink: 0;
        background-color: white;
    }

    .btn-text {
        font-size: 1.05rem;
        font-weight: 600;
        color: #1d1d1f;
        text-align: left;
    }

    .btn-card-multiple {
        cursor: default !important;
    }
    .btn-links-group {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        justify-content: flex-end;
        align-content: center;
        gap: 4px;
        margin-left: auto;
        overflow-x: auto;
    }

    .sub-link {
        flex-shrink: 0;
        width: 75px;
        padding: 6px 0;
        background: #f5f5f7;
        color: #0071e3;
        text-decoration: none;
        border-radius: 10px;
        font-size: 0.8rem;
        font-weight: 600;
        text-align: center;
        transition: all 0.2s ease;
    }
    .sub-link:active {
        transform: scale(0.95);
        background: #e8e8ed;
    }
    
    .footer {
        margin-top: 2.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        font-size: 0.85rem;
        color: #86868b;
    }
    .footer a {
        color: #bb271a;
        text-decoration: none;
        font-weight: 600;
    }
    </style>
</head>
<body>
    <div class="container">
        <h1>杖劍傳說查詢表</h1>
        
        <a class="btn-card" href="https://ggl.link/fqy-sxs-timeline">
            <img class="btn-img" src="https://github.com/QYMaple/sxs-research-tw/blob/298b2a4f28a2089a19334e9443189b155745e220/img/%E4%BC%8A%E6%A0%BC%E5%B0%BC%E6%96%AF.png" alt="icon">
            <div class="btn-text">賽季時間線</div>
        </a>

        <div class="btn-card btn-card-multiple">
            <img class="btn-img" src="https://github.com/QYMaple/sxs-research-tw/blob/dc4ea64086d642c4e92831a72381a13ec6c0b558/img/%E5%93%88%E5%B8%95%E8%BF%AA.png" alt="icon">
        
            <div class="btn-text" style="flex-grow: 1;">星象合約</div>
        
            <div class="btn-links-group">
                <a class="sub-link" href="https://ggl.link/fqy-astral-s1-s3">S1~S3</a>
                <a class="sub-link" href="https://ggl.link/fqy-astral-s4-s6">S4~S6</a>
                <a class="sub-link" href="https://ggl.link/fqy-astral-s4-s6">S7~S9</a>
            </div>
        </div>

        <a class="btn-card" href="https://ggl.link/fqy-mibao-hunt">
            <img class="btn-img" src="https://github.com/QYMaple/sxs-research-tw/blob/dc4ea64086d642c4e92831a72381a13ec6c0b558/img/%E7%A7%98%E5%AE%9D.png" alt="icon">
            <div class="btn-text">秘寶大作戰時間線</div>
        </a>

        <a class="btn-card" href="https://ggl.link/fqy-specialrelic">
            <img class="btn-img" src="https://github.com/QYMaple/sxs-research-tw/blob/dc4ea64086d642c4e92831a72381a13ec6c0b558/img/%E9%81%97%E7%89%A9.png" alt="icon">
            <div class="btn-text">全國度特殊屬性遺物</div>
        </a>

        <a class="btn-card" href="https://ggl.link/fqy-companions">
            <img class="btn-img" src="https://github.com/QYMaple/sxs-research-tw/blob/dc4ea64086d642c4e92831a72381a13ec6c0b558/img/%E4%BC%99%E4%BC%B4.png" alt="icon">
            <div class="btn-text">夥伴屬性彙總</div>
        </a>

        <a class="btn-card" href="https://ggl.link/fqy-class-change">
            <img class="btn-img" src="https://github.com/QYMaple/sxs-research-tw/blob/dc4ea64086d642c4e92831a72381a13ec6c0b558/img/%E6%8A%80%E8%83%BD.png" alt="icon">
            <div class="btn-text">轉職技能轉換表</div>
        </a>

        <a class="btn-card" href="https://discord.gg/sH6uN63Nwf">
            <img class="btn-img" src="https://github.com/QYMaple/sxs-research-tw/blob/dc4ea64086d642c4e92831a72381a13ec6c0b558/img/DC.png" alt="icon">
            <div class="btn-text" style="color: #5865F2;">歡迎加入楓琴柚Discord</div>
        </a>
        
        <div class="footer">
            <span>Made by</span>
            <a href="https://discord.gg/sH6uN63Nwf">楓琴柚</a>
        </div>
    </div>
</body>
</html>
